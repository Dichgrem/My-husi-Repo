<body>
  <h1>Husi Arch Repo</h1>
  <p>自动跟踪上游 Release 构建的非官方 pacman 仓库。</p>
  <h2>使用方法</h2>
  <p>在 <code>/etc/pacman.conf</code> 末尾添加：</p>
  <pre>[fr.husi]
SigLevel = Optional TrustAll
Server = https://Dichgrem.github.io/My-husi-Repo/x86_64</pre>
  <p>然后安装：</p>
  <pre>sudo pacman -Sy
sudo pacman -S fr.husi</pre>
  <p>需要 Java 21 或更高版本。推荐安装 <code>jdk21-openjdk</code>。</p>
</body>
</html>
